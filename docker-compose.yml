# Local dev stack for the "Usine à dossiers AO" MVP.
# Everything runs in containers so the only host prerequisite is Docker.
#   docker compose up --build
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: publique
      POSTGRES_PASSWORD: publique
      POSTGRES_DB: publique
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publique -d publique"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local S3-compatible object storage (stands in for Scaleway/OVH in dev).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: publique
      MINIO_ROOT_PASSWORD: publique-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on first boot, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 publique publique-secret &&
      mc mb --ignore-existing local/publique-dce &&
      echo 'bucket ready';
      "

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://publique:publique@db:5432/publique
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://publique:publique@db:5432/publique
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    command: python -m app.workers.worker
    volumes:
      - ./backend:/app

volumes:
  db_data:
  minio_data:
